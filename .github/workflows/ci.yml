name: CI

on:
  push:
    branches: [main, dev]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  KACHE_LOG: kache=debug

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: Linux
            runner: ubuntu-latest
          # TODO: re-enable once macOS runners are available
          # - os: macOS
          #   runner: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: azure/setup-helm@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: kunobi-ninja/kache-action@v1
        with:
          github-cache: "true"
          cache-executables: "false"
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: docker buildx bake -f docker-bake.hcl --print service
      - run: helm lint charts/kache-service
      - name: Install tarpaulin
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-tarpaulin
      - name: Test with coverage
        run: cargo tarpaulin --engine llvm --all-features --workspace --out Json
        env:
          RUSTC_WRAPPER: ""
      - name: Check coverage threshold (25%)
        run: |
          python3 -c "
          import json, sys
          data = json.load(open('tarpaulin-report.json'))
          coverage = data['coverage']
          threshold = 25.0
          print(f'Coverage: {coverage:.1f}%')
          if coverage < threshold:
              print(f'FAIL: below threshold {threshold}%')
              sys.exit(1)
          print(f'OK: >= {threshold}%')
          "

  publish:
    if: github.event_name != 'pull_request'
    needs: [check]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive publish metadata
        id: meta
        shell: bash
        run: |
          REF_NAME="${GITHUB_REF_NAME}"
          VERSION="0.0.0"
          IMAGE_TAG=$(echo "${REF_NAME}" | tr '[:upper:]' '[:lower:]' | sed 's#[^a-z0-9._-]#-#g')
          BUILD_VERSION="${REF_NAME}"
          PUBLISH_LATEST="false"

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${REF_NAME#v}"
            IMAGE_TAG="${VERSION}"
            BUILD_VERSION="${REF_NAME}"
            PUBLISH_LATEST="true"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "build_version=${BUILD_VERSION}" >> "$GITHUB_OUTPUT"
          echo "publish_latest=${PUBLISH_LATEST}" >> "$GITHUB_OUTPUT"
          echo "build_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Push service image
        env:
          REGISTRY: ghcr.io/${{ github.repository_owner }}
          VERSION: ${{ steps.meta.outputs.version }}
          IMAGE_TAG: ${{ steps.meta.outputs.image_tag }}
          BUILD_VERSION: ${{ steps.meta.outputs.build_version }}
          BUILD_COMMIT: ${{ github.sha }}
          BUILD_DATE: ${{ steps.meta.outputs.build_date }}
          PUBLISH_LATEST: ${{ steps.meta.outputs.publish_latest }}
        run: docker buildx bake -f docker-bake.hcl release

  # --- Release (only on v* tags) ---
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [check]
    uses: zondax/_workflows/.github/workflows/_release-rust.yml@main
    with:
      binary_name: kache
      targets: '["x86_64-unknown-linux-musl", "aarch64-unknown-linux-musl", "aarch64-apple-darwin", "x86_64-apple-darwin"]'
      runner_macos: '["self-hosted", "macOS", "ARM64"]'
      extra_build_env: |
        KACHE_VERSION=${{ github.ref_name }}
    permissions:
      contents: write
