# Firefox DAILY-PULL (temporal) compile-cache benchmark — WINDOWS (clang-cl),
# vanilla Firefox. Same temporal design as bench-firefox-pull; runs on the
# self-hosted kunobi-windows runner under MozillaBuild. See #477.
name = "bench-firefox-pull-windows"
tags = ["suite:bench", "project:firefox", "backend:kache", "lang:cc", "lang:cpp", "lang:rust", "scenario:pull", "os:windows"]

setup        = ["./mach bootstrap --application-choice browser ${MACH_BOOTSTRAP_FLAGS:-}"]
setup_marker = "~/.mozbuild"

build = "./mach build"

[source]
kind     = "clone"
repo     = "https://github.com/mozilla-firefox/firefox.git"
ref      = "24e52d9437e3fc676335893e579624458bc34789"
ref_next = "73c9f54454133a705eaceec1a43be995540e3ab4"
objdir   = "obj-kache-bench"

[[file]]
path    = "mozconfig"
content = """
# Generated by kache-scenario — daily-pull compile-cache benchmark (Windows/clang-cl, vanilla).
ac_add_options --enable-optimize
ac_add_options --disable-debug
ac_add_options --disable-tests
# Use the runner's already-provisioned MSVC + Windows SDK; do NOT let `./mach
# build` provision its OWN pinned Visual Studio via `get_vs.py`/`msiexec /a`,
# which fails with exit 1601 under the non-elevated NETWORK SERVICE account.
# `--enable-bootstrap=no-update` is insufficient (mach still *installs* the VS it
# lacks — it only skips *updates*), so disable bootstrap entirely and rely on the
# system toolchain (the same MSVC that ci.yml's `cargo` builds use).
ac_add_options --disable-bootstrap
ac_add_options --with-compiler-wrapper={kache}
mk_add_options "export RUSTC_WRAPPER={kache}"
mk_add_options "export KACHE_CACHE_EXECUTABLES=1"
mk_add_options "export CARGO_INCREMENTAL=0"
mk_add_options MOZ_OBJDIR=@TOPSRCDIR@/{objdir}
"""

[checks.assert.pull]
max_errors          = 0
max_passthrough_pct = 40.0

[checks.measure.pull]
min_hit_rate_pct = 10.0
