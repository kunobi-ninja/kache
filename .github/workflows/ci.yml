name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  KACHE_LOG: kache=debug

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: Linux
            runner: ubuntu-latest
          # TODO: re-enable once macOS runners are available
          # - os: macOS
          #   runner: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v3
        with:
          install_args: "github:casey/just@1.43.1"
          env: "false"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: azure/setup-helm@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: kunobi-ninja/kache-action@v1
        with:
          github-cache: "true"
          cache-executables: "false"
      - name: Install tarpaulin
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-tarpaulin
      - name: Run repo verification
        run: just ci
      - name: Check coverage threshold (35%, push only)
        if: github.event_name == 'push'
        run: |
          python3 -c "
          import json, sys
          data = json.load(open('tarpaulin-report.json'))
          coverage = data['coverage']
          threshold = 35.0
          print(f'Coverage: {coverage:.1f}%')
          if coverage < threshold:
              print(f'FAIL: below threshold {threshold}%')
              sys.exit(1)
          print(f'OK: >= {threshold}%')
          "
      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-html
          path: tarpaulin-report.html
          retention-days: 14

  # --- E2E smoke test ---
  # Builds kache, configures as RUSTC_WRAPPER, cold-builds a fixture project,
  # cleans, warm-builds, and verifies cache hits work end-to-end.
  e2e:
    name: E2E smoke (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: Linux
            runner: ubuntu-latest
          # TODO: re-enable once macOS runners are available
          # - os: macOS
          #   runner: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build kache (release)
        run: cargo build --release
        env:
          RUSTC_WRAPPER: ""
      - name: Run e2e smoke test
        run: bash scripts/e2e-smoke.sh ./target/release/kache

  # --- Windows exploratory check (non-blocking) ---
  # Surfaces remaining Windows porting work for issue #45. Allowed to fail
  # until the daemon (UnixStream/UnixListener), wrapper flock, and other
  # unix-only paths get Windows arms. Remove `continue-on-error` once green.
  windows-check:
    name: Windows check (exploratory)
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo check (x86_64-pc-windows-msvc)
        run: cargo check --target x86_64-pc-windows-msvc

  # --- Release (only on v* tags) ---
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [check]
    uses: zondax/_workflows/.github/workflows/_release-rust.yml@main
    with:
      binary_name: kache
      targets: '["x86_64-unknown-linux-musl", "aarch64-unknown-linux-musl", "aarch64-apple-darwin", "x86_64-apple-darwin"]'
      runner_macos: '["self-hosted", "macOS", "ARM64"]'
      extra_build_env: |
        KACHE_VERSION=${{ github.ref_name }}
    permissions:
      contents: write
