name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  KACHE_LOG: kache=debug

jobs:
  check:
    name: Check (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: Linux
            runner: ubuntu-latest
          # `check` runs the full `just ci` (docker buildx + helm + tarpaulin)
          # and stays Linux-only. macOS gets a dedicated, lighter `test-macos`
          # job below — see that job for the rationale.
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v3
        with:
          install_args: "github:casey/just@1.43.1"
          env: "false"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: azure/setup-helm@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: kunobi-ninja/kache-action@v1
        with:
          github-cache: "true"
          cache-executables: "false"
      - name: Install tarpaulin
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-tarpaulin
      - name: Run repo verification
        run: just ci
        timeout-minutes: 30
      - name: Check coverage threshold (35%, push only)
        if: github.event_name == 'push'
        run: |
          python3 -c "
          import json, sys
          data = json.load(open('tarpaulin-report.json'))
          coverage = data['coverage']
          threshold = 35.0
          print(f'Coverage: {coverage:.1f}%')
          if coverage < threshold:
              print(f'FAIL: below threshold {threshold}%')
              sys.exit(1)
          print(f'OK: >= {threshold}%')
          "
      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-html
          path: tarpaulin-report.html
          retention-days: 14

  # --- E2E smoke test ---
  # Builds kache, configures as RUSTC_WRAPPER, cold-builds a fixture project,
  # cleans, warm-builds, and verifies cache hits work end-to-end.
  e2e:
    name: E2E smoke (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: Linux
            runner: ubuntu-latest
          - os: macOS
            runner:
              - self-hosted
              - macOS
              - ARM64
    steps:
      - uses: actions/checkout@v4
      # GitHub-hosted Linux gets a fresh rustup toolchain via the action.
      # The self-hosted macOS runner's shared Rust is unusable (corrupted
      # ~/.rustup, stale Homebrew Rust), so it installs a clean isolated
      # rustup per run instead — see the `test-macos` job for the rationale.
      - name: Install Rust (Linux)
        if: runner.os == 'Linux'
        uses: dtolnay/rust-toolchain@stable
      - name: Set up an isolated Rust toolchain (macOS)
        if: runner.os == 'macOS'
        run: |
          echo "RUSTUP_HOME=$RUNNER_TEMP/rustup" >> "$GITHUB_ENV"
          echo "CARGO_HOME=$RUNNER_TEMP/cargo" >> "$GITHUB_ENV"
          echo "$RUNNER_TEMP/cargo/bin" >> "$GITHUB_PATH"
          export RUSTUP_HOME="$RUNNER_TEMP/rustup" CARGO_HOME="$RUNNER_TEMP/cargo"
          curl --proto '=https' --tlsv1.2 -fsSL https://sh.rustup.rs \
            | sh -s -- -y --no-modify-path --default-toolchain none
      - name: Build kache + e2e harness (release)
        run: |
          rustc --version && cargo --version
          cargo build --release -p kache && cargo build --release -p kache-e2e
        env:
          RUSTC_WRAPPER: ""
      - name: Run e2e harness (all fixtures)
        # Single Rust harness drives every fixture in test-projects/
        # through cold → warm → noop, applies per-fixture assertions
        # against `kache report --format json`, and writes a single
        # results.json. Replaces the previous per-language bash scripts.
        run: |
          mkdir -p e2e-results
          ./target/release/kache-e2e \
            --kache ./target/release/kache \
            --fixtures ./test-projects \
            --out e2e-results/results.json
      - name: Show aggregated e2e results
        if: always()
        run: |
          if [ -f e2e-results/results.json ]; then
            echo "--- e2e results.json ---"
            cat e2e-results/results.json
          else
            echo "no results.json produced"
          fi
      - name: Upload e2e results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: e2e-results/
          retention-days: 14

  # --- macOS test suite ---
  # The Linux `check` job runs the full `just ci` (coverage + docker + helm);
  # replicating that on macOS isn't worth it. Instead this job runs a focused
  # `cargo test` pass on a self-hosted Apple Silicon runner so OS-specific
  # regressions — e.g. the daemon's Unix-socket EOF behaviour, which once hung
  # the suite on macOS while passing on Linux — are caught before merge.
  # Blocking: macOS is a first-class supported platform.
  test-macos:
    name: Test (macOS)
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v4
      # This persistent self-hosted runner has neither a usable shared
      # toolchain: its ~/.rustup is corrupted, and its Homebrew Rust is
      # stale (1.94, below the pinned 1.95). So install a clean rustup into
      # the per-run temp dir — fully isolated from the runner's shared Rust
      # state — and let rust-toolchain.toml drive the exact version.
      - name: Set up an isolated Rust toolchain
        run: |
          echo "RUSTUP_HOME=$RUNNER_TEMP/rustup" >> "$GITHUB_ENV"
          echo "CARGO_HOME=$RUNNER_TEMP/cargo" >> "$GITHUB_ENV"
          echo "$RUNNER_TEMP/cargo/bin" >> "$GITHUB_PATH"
          export RUSTUP_HOME="$RUNNER_TEMP/rustup" CARGO_HOME="$RUNNER_TEMP/cargo"
          curl --proto '=https' --tlsv1.2 -fsSL https://sh.rustup.rs \
            | sh -s -- -y --no-modify-path --default-toolchain none
      - name: cargo test (workspace)
        run: |
          rustc --version && cargo --version
          cargo test --workspace
        timeout-minutes: 30
        env:
          RUSTC_WRAPPER: ""

  # --- Windows exploratory check (non-blocking) ---
  # Surfaces remaining Windows porting work for issue #45. Allowed to fail
  # until the daemon (UnixStream/UnixListener), wrapper flock, and other
  # unix-only paths get Windows arms. Remove `continue-on-error` once green.
  windows-check:
    name: Windows check (exploratory)
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: cargo check (x86_64-pc-windows-msvc)
        run: cargo check --target x86_64-pc-windows-msvc

  # --- Release (only on v* tags) ---
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [check]
    uses: zondax/_workflows/.github/workflows/_release-rust.yml@main
    with:
      binary_name: kache
      targets: '["x86_64-unknown-linux-musl", "aarch64-unknown-linux-musl", "aarch64-apple-darwin", "x86_64-apple-darwin"]'
      runner_macos: '["self-hosted", "macOS", "ARM64"]'
      extra_build_env: |
        KACHE_VERSION=${{ github.ref_name }}
    permissions:
      contents: write
