# Firefox compile-cache benchmark profile for kache-bench.
# See bench-profiles/README.md for the format.
name     = "firefox"
repo     = "https://github.com/mozilla-firefox/firefox.git"
ref      = "FIREFOX_151_0_RELEASE"
requires = ["mach", "python3"]
objdir   = "obj-kache-bench"

# One-time toolchain setup. Skipped when ~/.mozbuild already exists
# (--force-setup overrides); the toolchain it installs is shared across runs.
setup        = ["./mach bootstrap --application-choice browser"]
setup_marker = "~/.mozbuild"

build = "./mach build"

# Firefox ships no mozconfig, so we own and write this file. The cc side
# genuinely needs it: --with-compiler-wrapper can't come from env.
[[file]]
path    = "mozconfig"
content = """
# Generated by kache-bench — compile-cache benchmark.
# Optimized, non-debug, no LTO/PGO: representative of a dev build
# and the fairest workload for a compile cache (LTO would defer
# codegen to link time and shrink the cacheable -c surface; PGO
# would build twice). Drop --disable-tests for a larger workload.
ac_add_options --enable-optimize
ac_add_options --disable-debug
ac_add_options --disable-tests

# Prepend kache as the C/C++ compiler launcher. Firefox keeps
# selecting its own bootstrapped clang; kache wraps each -c step.
#
# --with-compiler-wrapper, NOT --with-ccache: --with-ccache makes
# mozbuild run `<wrapper> -s` for ccache stats at build start, and
# kache rejects `-s` (exit 2) → the build aborts. The wrapper knob
# prepends kache identically but skips that ccache stats probe.
ac_add_options --with-compiler-wrapper={kache}

# Route rustc through kache too (also set on the build env).
mk_add_options "export RUSTC_WRAPPER={kache}"

# Incremental compilation is redundant once a compile cache is in
# play — kache treats it so (it cleans incremental dirs) and
# Firefox itself disables it for sccache/buildcache. Off here keeps
# the objdir lean and removes a measurement-noise source. (Not a
# correctness fix: kache already excludes -Cincremental from the
# cache key.)
mk_add_options "export CARGO_INCREMENTAL=0"

# Per-clone objdir so the two builds never collide.
mk_add_options MOZ_OBJDIR=@TOPSRCDIR@/{objdir}
"""
