# Firefox compile-cache benchmark — WINDOWS (clang-cl) variant.
#
# Same project, ref, and build driver as `bench-firefox`, but tuned for the
# self-hosted `kunobi-windows` runner where Firefox builds with clang-cl + MSVC
# under MozillaBuild. It exists as its OWN scenario (bench profiles have no
# per-OS `[windows]` override, unlike e2e fixtures). It is reached by its fuller
# `firefox-windows` profile name, so the host-native nightly's `bench firefox`
# (which disambiguates to the exact `bench-firefox` scenario) never picks it up.
# The `os:windows` tag below is accurate metadata (this scenario genuinely
# requires Windows), not a selection workaround.
#
# v1 scope: a single reference clone + two git worktrees (the harness default),
# i.e. cold in clone-a then warm in clone-b. Cross-clone cache-key CONVERGENCE
# on Windows (drive letters, `..`-shaped and backslash paths) is unsolved, so
# `min_key_stability_pct` is deliberately relaxed below. The gates that catch
# the bug class this scenario is for — an unclassified clang-cl driver flag
# falling through to passthrough instead of caching (e.g. #438
# `-fansi-escape-codes`) — are `max_passthrough_pct` + `max_errors`, which hold
# regardless of cross-path key stability.
name = "bench-firefox-windows"
tags = ["suite:bench", "project:firefox", "backend:kache", "lang:cc", "lang:cpp", "lang:rust", "os:windows"]

# One-time toolchain setup. `./mach bootstrap` runs under MozillaBuild's `sh`
# and provisions ~/.mozbuild (shared across runs). It pulls its own clang/rust
# but relies on the runner already having MozillaBuild + Visual Studio Build
# Tools (MSVC + Windows SDK) — bootstrap cannot install Visual Studio.
#
# `$MACH_BOOTSTRAP_FLAGS` lets the caller append flags WITHOUT hardcoding a
# CI-only choice into the scenario (setup runs via `sh -c`, so the env var is
# expanded by the shell; the scenario interpolator only touches `{kache}`-style
# braces). It is unset for a LOCAL run, so a developer gets a full bootstrap
# that actually installs the system dependencies. In CI the bench workflow sets
# it to `--no-system-changes`: there the runner service runs as
# NT AUTHORITY\NETWORK SERVICE (non-elevated), so mach's own SDK acquisition via
# `msiexec /a` (an administrative install) fails with `exit 1601` ("Windows
# Installer service could not be accessed"); the flag makes mach use the
# pre-provisioned MSVC + Windows SDK (installed by ans-runners) and skip the
# system install, while still fetching user-level clang/rust into ~/.mozbuild.
setup        = ["./mach bootstrap --application-choice browser ${MACH_BOOTSTRAP_FLAGS:-}"]
setup_marker = "~/.mozbuild"

build = "./mach build"

[source]
kind   = "clone"
repo   = "https://github.com/mozilla-firefox/firefox.git"
ref    = "FIREFOX_151_0_RELEASE"
objdir = "obj-kache-bench"

# Firefox ships no mozconfig, so we own and write this file. Mirrors
# bench-firefox; on Windows Firefox selects clang-cl itself, and
# --with-compiler-wrapper prepends kache to each clang-cl -c step identically.
[[file]]
path    = "mozconfig"
content = """
# Generated by kache-scenario — compile-cache benchmark (Windows/clang-cl).
# Optimized, non-debug, no LTO/PGO: representative of a dev build and the
# fairest workload for a compile cache.
ac_add_options --enable-optimize
ac_add_options --disable-debug
ac_add_options --disable-tests

# Prepend kache as the C/C++ compiler launcher. --with-compiler-wrapper (NOT
# --with-ccache, which runs `<wrapper> -s` for ccache stats and kache rejects
# `-s`). On Windows the wrapper is kache.exe; mozbuild reads this file under its
# own bash, so forward slashes in the interpolated path are fine.
ac_add_options --with-compiler-wrapper={kache}

# Route rustc through kache too.
mk_add_options "export RUSTC_WRAPPER={kache}"

# Cache rust bin/dylib/cdylib/proc-macro outputs (off by default). Safe to
# measure here: the bench's leak detector + negative control surface any
# path-baking as a divergence/miss rather than a silent wrong-artifact restore.
mk_add_options "export KACHE_CACHE_EXECUTABLES=1"

# Incremental compilation is redundant once a compile cache is in play.
mk_add_options "export CARGO_INCREMENTAL=0"

# Per-clone objdir so the two worktrees never collide.
mk_add_options MOZ_OBJDIR=@TOPSRCDIR@/{objdir}

# Cross-clone cache-key portability. KACHE_BASE_DIR rewrites paths under it to a
# stable sentinel in the cache key; @TOPSRCDIR@ expands per worktree so each
# normalizes its OWN objdir path. (Windows path shapes mean convergence is
# best-effort here — see the relaxed warm assertion below.)
mk_add_options "export KACHE_BASE_DIR=@TOPSRCDIR@"

# Pin the Firefox build ID so buildid.cpp / application.ini.h are byte-identical
# across worktrees built minutes apart.
mk_add_options "export MOZ_BUILD_DATE=20260101000000"

# Opt path-only env vars into kache key normalization (the OUT_DIR contract).
mk_add_options "export KACHE_PATH_ONLY_ENV_VARS=BUILDCONFIG_RS,MOZ_TOPOBJDIR,MOZ_TOPSRCDIR,CONVERSIONS_FILE,GLEAN_METRICS_FILE,BINDINGS,TYPENUM_BUILD_CONSTS,TYPENUM_BUILD_OP,TYPENUM_BUILD_GENERIC_CONSTS"
"""

# Shared cross-clone convergence patches — reused from bench-firefox (resolved
# relative to this scenario dir). mozbuild path-clean + generated-source-relative
# make the cascade-root rlibs byte-identical across checkouts. These are
# text/`git apply` patches; if Windows checkout line endings reject them, the
# run fails loudly at apply time (a known thing to shake out on first real run).
[[file]]
path         = "build/rust/mozbuild/generate_buildconfig.py"
mode         = "patch"
content_file = "../bench-firefox/patches/firefox-mozbuild-path-clean.patch"

[[file]]
path         = "gfx/wr/webrender/build.rs"
mode         = "patch"
content_file = "../bench-firefox/patches/firefox-generated-source-relative.patch"

# v1 gates. min_key_stability_pct is relaxed (cross-path convergence on Windows
# is unsolved); max_passthrough_pct + max_errors are the meaningful gates that
# catch an unclassified clang-cl flag falling through to passthrough (#438).
[checks.assert.warm]
min_key_stability_pct = 10.0
max_passthrough_pct = 40.0
max_errors = 0
