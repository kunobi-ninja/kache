# kache-e2e fixture: a build kache must NOT cache.
#
# The inverse of c-hello. The `-c` compile passes `-funroll-loops` — a
# codegen-affecting flag in the `-f...` family that kache does not
# model in its cache key. Caching it would risk a silent miscache: two
# builds differing only by such a flag would collide on one key. So
# kache refuses — the compile passes through to the real compiler,
# uncached — and every phase lands ZERO cache entries.
#
# This is the e2e cell for the unmodeled-codegen-flag passthrough
# behavior (the `is_unmodeled_codegen_flag` refuse rule). c-hello
# proves a clean compile caches; this proves an unsafe one does not.

name = "c-passthrough"

[env]
CC = "$KACHE cc"

[commands]
build = "make"
clean = "make clean"

[verify]
run = "./build/main"
expected_stdout_contains = ["c-passthrough ok"]

# Cold: `-funroll-loops` is unmodeled → the compile is refused →
# passthrough → no kache event → nothing in the cache.
[assertions.cold]
max_entries_after = 0

# Warm: still passthrough. kache never caches this build, so a rebuild
# cannot hit — zero entries again. (If a regression re-enabled caching
# for unmodeled flags, an entry would appear here and trip this.)
[assertions.warm]
max_entries_after = 0

# Noop: `make` sees build/ up to date, does nothing. No marker to
# assert against — same as c-hello.
[assertions.noop]
should_not_recompile = false

# Relocate: passthrough just runs the compiler, so a build at a
# different path also caches nothing.
[assertions.relocate]
max_entries_after = 0
