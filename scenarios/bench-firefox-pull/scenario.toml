# Firefox DAILY-PULL (temporal) compile-cache benchmark — vanilla Firefox.
#
# Unlike bench-firefox (cross-clone: same source at two different paths), this
# scenario measures the TEMPORAL axis that issue #477 reports: build one
# checkout at ref A, `git checkout` a ~1-day-later ref B in the SAME worktree,
# rebuild from scratch, and report how much of the full TU set kache still hit.
#
# VANILLA on purpose: NO path-clean/generated-source patches and NO
# MOZ_BUILD_DATE pin — this is what a real `./mach build` user runs (the patches
# fix cross-PATH baking, which a same-checkout pull never exercises). Because
# the pull phase wipes the objdir, kache is asked about every TU, so the hit
# rate is the fraction of the full TU set whose cache key survived the delta —
# NOT a wall-clock speedup (a real incremental build skips unchanged files and
# is faster than this number implies).
#
# The two commits are the issue's own reproduction range, so this doubles as a
# direct #477 regression. Bump them deliberately (keep A and B close enough to
# share one `./mach bootstrap` toolchain).
name = "bench-firefox-pull"
tags = ["suite:bench", "project:firefox", "backend:kache", "lang:cc", "lang:cpp", "lang:rust", "scenario:pull"]

setup        = ["./mach bootstrap --application-choice browser"]
setup_marker = "~/.mozbuild"

build = "./mach build"

[source]
kind     = "clone"
repo     = "https://github.com/mozilla-firefox/firefox.git"
ref      = "24e52d9437e3fc676335893e579624458bc34789"
ref_next = "73c9f54454133a705eaceec1a43be995540e3ab4"
objdir   = "obj-kache-bench"

[[file]]
path    = "mozconfig"
content = """
# Generated by kache-scenario — daily-pull compile-cache benchmark (vanilla).
ac_add_options --enable-optimize
ac_add_options --disable-debug
ac_add_options --disable-tests
ac_add_options --with-compiler-wrapper={kache}
mk_add_options "export RUSTC_WRAPPER={kache}"
mk_add_options "export KACHE_CACHE_EXECUTABLES=1"
mk_add_options "export CARGO_INCREMENTAL=0"
mk_add_options MOZ_OBJDIR=@TOPSRCDIR@/{objdir}
"""

# Pull-phase gates. max_errors + max_passthrough_pct are blocking (they catch a
# broken/uncached build and unclassified driver flags); the hit rate is
# warn-only for now — we are baselining a number, not yet enforcing a floor.
[checks.assert.pull]
max_errors          = 0
max_passthrough_pct = 40.0

[checks.measure.pull]
min_hit_rate_pct = 50.0
